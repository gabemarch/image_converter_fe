services:
  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_ADSENSE_CLIENT=${NEXT_PUBLIC_ADSENSE_CLIENT:-}
        - NEXT_PUBLIC_ADSENSE_SLOT_INLINE=${NEXT_PUBLIC_ADSENSE_SLOT_INLINE:-}
        - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - appnet

  backend:
    build:
      context: ../image-converter-be
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=http://localhost:3000,https://files2convert.com
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
